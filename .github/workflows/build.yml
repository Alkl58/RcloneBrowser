name: Build Rclone Browser

on:
  push:
    branches:
      - main
      - master
      
  workflow_dispatch:
  
jobs:
  build_windows:
    name: Windows Build
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
      - name: Build Rclone Browser
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 18 2026" -A x64 -DCMAKE_CONFIGURATION_TYPES="Release" -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" ..
          cmake --build . --config Release
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --no-translations --no-angle --no-compiler-runtime --no-svg ".\build\Release\RcloneBrowser.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build\build\Release\*
          
  build_linux:
    name: Linux Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - name: Install Development Tools
        run: |
          sudo apt update
          sudo apt -y install git g++ cmake make qtdeclarative5-dev qtmultimedia5-dev
      - name: Build Rclone Browser
        run: |
          mkdir build
          cd build
          cmake ..
          make -j $(nproc)
          
      - uses: actions/upload-artifact@v4
        with:
         name: linux
         path: build/build/*
         
  build_macos:
    name: macOS Build
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
      - name: Build Rclone Browser
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          make -j $(sysctl -n hw.ncpu)
          cd build
          "$QT_ROOT_DIR/bin/macdeployqt" rclone-browser.app -executable="rclone-browser.app/Contents/MacOS/rclone-browser" -qmldir=../src/
          mv rclone-browser.app Rclone\ Browser.app
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/build/*
        
  build_freebsd:
    name: FreeBSD Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - name: Install Development Tools and Build Rclone Browser
        uses: vmactions/freebsd-vm@v1
        with:
          mem: 4096
          usesh: true
          prepare: |
            env ASSUME_ALWAYS_YES=YES pkg update -f
            env ASSUME_ALWAYS_YES=YES pkg install -y git cmake qt5-buildtools qt5-declarative qt5-multimedia qt5-qmake
          run: |
            mkdir build
            cd build
            cmake ..
            make
            
      - uses: actions/upload-artifact@v4
        with:
          name: freebsd
          path: build/build/*

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build_windows, build_linux, build_macos, build_freebsd]
    
    steps:
      - uses: actions/checkout@v4
      - name: Create artifact directory
        run: rm -rf /tmp/artifacts && mkdir /tmp/artifacts
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
      - name: Compress artifacts
        run: |
          pushd /tmp/artifacts
          for i in *;do zip -r -0 $i.zip $i;done
          popd
          
      - name: Get short commit
        run: echo "SHORT_SHA=`echo ${GITHUB_SHA} | cut -c1-8`" >> $GITHUB_ENV
        
      - uses: rickstaa/action-create-tag@v1
        with:
          tag: release-${{ env.SHORT_SHA }}
          tag_exists_error: false
          
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "/tmp/artifacts/*.zip"
          name: Rclone Browser Autobuild For Commit ${{ env.SHORT_SHA }}
          omitBody: true
          generateReleaseNotes: true
          prerelease: true
          skipIfReleaseExists: true
          tag: release-${{ env.SHORT_SHA }}
